name: Build, Sign, Notarize & Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.2.1, etc.

env:
  APP_NAME: BarKeeper
  BUNDLE_ID: com.abeckdev.barkeeper
  SCHEME: BarKeeper
  XCODE_VERSION: '16.0'

jobs:
  build-sign-notarize:
    name: Build, Sign, Notarize & Release
    runs-on: macos-15
    permissions:
      contents: write  # Needed to create GitHub Releases

    steps:
      # ─── Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Setup Xcode ───────────────────────────────────────
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      # ─── Generate Xcode Project ─────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ─── Import Signing Certificate ─────────────────────────
      - name: Import code signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ─── Build & Archive ────────────────────────────────────
      - name: Build and archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}  # Strip 'v' prefix from tag (v1.0.0 → 1.0.0)
          xcodebuild archive \
            -project "${{ env.APP_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"

      # ─── Export App ─────────────────────────────────────────
      - name: Create export options plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ─── Notarize ──────────────────────────────────────────
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # Create a ZIP for notarization submission
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/${{ env.APP_NAME }}.app" \
            "$RUNNER_TEMP/${{ env.APP_NAME }}-notarize.zip"

          # Submit for notarization and wait
          xcrun notarytool submit \
            "$RUNNER_TEMP/${{ env.APP_NAME }}-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          # Staple the notarization ticket to the app
          xcrun stapler staple "$RUNNER_TEMP/export/${{ env.APP_NAME }}.app"

      # ─── Package Artifacts ──────────────────────────────────
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder "$RUNNER_TEMP/export/${{ env.APP_NAME }}.app" \
            -ov -format UDZO \
            "$RUNNER_TEMP/${{ env.APP_NAME }}.dmg"

      - name: Create ZIP
        run: |
          cd "$RUNNER_TEMP/export"
          ditto -c -k --keepParent "${{ env.APP_NAME }}.app" \
            "$RUNNER_TEMP/${{ env.APP_NAME }}.zip"

      - name: Compute SHA256 checksums
        run: |
          echo "DMG_SHA256=$(shasum -a 256 "$RUNNER_TEMP/${{ env.APP_NAME }}.dmg" | awk '{print $1}')" >> $GITHUB_ENV
          echo "ZIP_SHA256=$(shasum -a 256 "$RUNNER_TEMP/${{ env.APP_NAME }}.zip" | awk '{print $1}')" >> $GITHUB_ENV

      # ─── Create GitHub Release ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Checksums (SHA256)
            - **DMG:** `${{ env.DMG_SHA256 }}`
            - **ZIP:** `${{ env.ZIP_SHA256 }}`
          files: |
            ${{ runner.temp }}/BarKeeper.dmg
            ${{ runner.temp }}/BarKeeper.zip

      # ─── Cleanup ────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
